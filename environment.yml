name: r-binder
channels:
  - conda-forge
dependencies:
  - python=3.11
  - jupyterlab
  - r-base=4.3.*         # pin if you need a specific R series
  - r-irkernel
  # Common R packages
  - r-tidyverse
  - r-data.table
  - r-arrow
  - r-shiny
  - r-plotly
  - r-readxl
  - r-openxlsx
  - r-jsonlite
  - r-httr
  - r-devtools
  - r-remotes
  - r-airGRteaching
  - r-airGRdatasets
  - r-airGR
  # If you need geospatial or system-libs-backed packages, add:
  # - r-sf
  # - r-terra
  # - gdal
  # - geos
  # - proj
